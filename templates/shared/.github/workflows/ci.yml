name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PACKAGE: {{PKG_SLUG}}
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  check:
    name: Typecheck & Unit
    runs-on: ubuntu-latest
    steps:
      # 1. This PR's code, checked out into the member slot.
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      # 2. Pin a Node that satisfies bootstrap's engines.node (>=24) so the
      #    assemble step below doesn't depend on whatever ubuntu-latest ships.
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      # 3. Assemble the workspace root: writes package.json + tinycld.packages.ts
      #    from bootstrap's embedded templates, clones app + core as siblings.
      #    The PR's PACKAGE dir is already there and is skipped.
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      # 4. Now switch to the version the assembled workspace pins (ws/.node-version
      #    is written by the assemble step above).
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Typecheck + unit
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      # Pin a Node that satisfies bootstrap's engines.node (>=24) so the
      # assemble step below doesn't depend on whatever ubuntu-latest ships.
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      # Switch to the version the assembled workspace pins.
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Install Playwright browsers
        working-directory: ws/app
        run: npx playwright install --with-deps chromium
      - name: E2E
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg test:e2e
      # Capture Playwright's per-failure artifacts (trace, screenshot,
      # video, error-context.md) so a CI failure can be diagnosed
      # without a re-run. `if: failure()` skips the upload on green
      # runs to save bandwidth + retention.
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            ws/${{ env.PACKAGE }}/test-results/
            ws/${{ env.PACKAGE }}/playwright-report/
          retention-days: 14

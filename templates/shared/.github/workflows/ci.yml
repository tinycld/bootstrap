name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PACKAGE: {{PKG_SLUG}}
  TEST_USER_LOGIN: user@tinycld.org
  TEST_USER_PW: TestUser1234!
  ADMIN_USER_LOGIN: admin@tinycld.org
  ADMIN_USER_PW: AdminPass1234!

jobs:
  check:
    name: Typecheck & Unit
    runs-on: ubuntu-latest
    steps:
      # 1. This PR's code, checked out into the member slot.
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      # 2. Assemble the workspace root: writes package.json + tinycld.packages.ts
      #    from bootstrap's embedded templates, clones app + core as siblings.
      #    The PR's PACKAGE dir is already there and is skipped.
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Typecheck + unit
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg check

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: ws/${{ env.PACKAGE }}
      - name: Assemble workspace (app + core)
        working-directory: ws
        run: TINYCLD_REPO_BASE=https://github.com/tinycld npx @tinycld/bootstrap@latest --assemble-only
      - uses: actions/setup-node@v5
        with:
          node-version-file: ws/.node-version
      - uses: actions/setup-go@v6
        with:
          go-version-file: ws/.go-version
      - name: Install (workspace root)
        working-directory: ws
        run: npm install
      - name: Install Playwright browsers
        working-directory: ws/app
        run: npx playwright install --with-deps chromium
      - name: E2E
        working-directory: ws/${{ env.PACKAGE }}
        run: npx tinycld-pkg test:e2e
